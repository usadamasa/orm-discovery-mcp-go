version: "3"

vars:
  BIN: bin/backlog-cli

tasks:
  build:
    desc: Build backlog-cli binary
    cmds:
      - go build -o {{.BIN}} .
    sources:
      - "**/*.go"
      - go.mod
    generates:
      - "{{.BIN}}"

  test:
    desc: Run all tests
    cmds:
      - go test ./... -v -count=1

  install:
    desc: Build and copy to project root .backlog/
    deps: [build]
    cmds:
      - cp {{.BIN}} ../../../../.backlog/backlog-cli

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  ci:
    desc: Full CI workflow
    cmds:
      - task: lint
      - task: test
      - task: build
